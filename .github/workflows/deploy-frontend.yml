name: Deploy to S3

on:
  push:
    branches:
      - main
      - develop
    paths:
      - 'frontend/**'
  workflow_dispatch:

env:
  AWS_REGION: us-east-1
  S3_BUCKET: azubi-sucess-app
  SOURCE_FOLDER: ./frontend

permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Debug OIDC
        run: |
          echo "Request URL: $ACTIONS_ID_TOKEN_REQUEST_URL"
          curl -s -H "Authorization: bearer $ACTIONS_ID_TOKEN_REQUEST_TOKEN" \
            "$ACTIONS_ID_TOKEN_REQUEST_URL&audience=sts.amazonaws.com" \
            | python3 -c "
import json, sys, base64
d = json.load(sys.stdin)
t = d['value']
p = t.split('.')[1]
p += '=' * (4 - len(p) % 4)
c = json.loads(base64.urlsafe_b64decode(p))
print('sub:', c.get('sub'))
print('aud:', c.get('aud'))
print('job_workflow_ref:', c.get('job_workflow_ref'))
"

      - name: Configure AWS credentials using OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::${{ secrets.AWS_ACCOUNT_ID }}:role/${{ secrets.AWS_ROLE_NAME }}
          aws-region: ${{ env.AWS_REGION }}
          audience: sts.amazonaws.com

      - name: Sync files to S3
        run: |
          aws s3 sync ${{ env.SOURCE_FOLDER }} s3://${{ env.S3_BUCKET }}/ \
            --delete \
            --exclude ".git/*"
