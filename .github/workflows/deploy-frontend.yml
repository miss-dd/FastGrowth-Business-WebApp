name: Deploy to S3

on:
  push:
    branches:
      - main
      - develop
    paths:
      - 'frontend/**'
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials using OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::382975714531:role/github-fastgrowth-s3-deploy
          aws-region: us-east-1

      - name: Sync files to S3
        run: |
          aws s3 sync ./frontend s3://azubi-sucess-app/ \
            --delete \
            --exclude ".git/*"
