name: Deploy to S3

on:
  push:
    branches:
      - main
      - develop
    paths:
      - 'frontend/**'
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Get OIDC token and decode claims
        run: |
          TOKEN=$(curl -s -H "Authorization: bearer $ACTIONS_ID_TOKEN_REQUEST_TOKEN" \
            "$ACTIONS_ID_TOKEN_REQUEST_URL&audience=sts.amazonaws.com" | python3 -c "import json,sys;print(json.load(sys.stdin)['value'])")
          echo "$TOKEN" | python3 -c "
import base64, json, sys
t = sys.stdin.read().strip()
p = t.split('.')[1]
p += '=' * (4 - len(p) % 4)
c = json.loads(base64.urlsafe_b64decode(p))
for k, v in c.items():
    print(f'{k}: {v}')
"

      - name: Assume role and sync
        run: |
          TOKEN=$(curl -s -H "Authorization: bearer $ACTIONS_ID_TOKEN_REQUEST_TOKEN" \
            "$ACTIONS_ID_TOKEN_REQUEST_URL&audience=sts.amazonaws.com" | python3 -c "import json,sys;print(json.load(sys.stdin)['value'])")
          aws sts assume-role-with-web-identity \
            --role-arn arn:aws:iam::382975714531:role/github-fastgrowth-s3-deploy \
            --role-session-name GitHubActions \
            --web-identity-token "$TOKEN" \
            --duration-seconds 3600 \
            --region us-east-1 2>&1 || true
          echo "---sync---"
          aws configure set aws_access_key_id $AKI
          aws s3 sync ./frontend s3://azubi-sucess-app/ \
            --delete \
            --exclude ".git/*" || true
