name: Deploy Frontend to S3

on:
  push:
    branches: [main]
    paths:
      - 'frontend/**'
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      ACTIONS_ALLOW_USE_UNSECURE_NODE_VERSION: true
    defaults:
      run:
        working-directory: ./frontend

    steps:
      - uses: actions/checkout@v4

      - name: Assume role with OIDC
        shell: bash
        run: |
          set +e
          TOKEN=$(curl -s -H "Authorization: bearer $ACTIONS_ID_TOKEN_REQUEST_TOKEN" \
            "$ACTIONS_ID_TOKEN_REQUEST_URL&audience=sts.amazonaws.com" 2>&1)
          echo "OIDC token response: $TOKEN" | head -c 200
          echo ""
          TOKEN_VAL=$(echo "$TOKEN" | python3 -c "import json,sys; print(json.load(sys.stdin)['value'])" 2>&1)
          echo "Token extracted successfully"

          echo "Calling AssumeRoleWithWebIdentity..."
          CREDS_JSON=$(aws sts assume-role-with-web-identity \
            --role-arn arn:aws:iam::382975714531:role/github-fastgrowth-s3-deploy \
            --role-session-name GitHubActions \
            --web-identity-token "$TOKEN_VAL" \
            --duration-seconds 3600 \
            --region us-east-1 2>&1)
          RC=$?
          echo "Exit code: $RC"
          echo "Output: $CREDS_JSON"
          echo "$CREDS_JSON" | python3 -m json.tool 2>/dev/null

          if [ $RC -eq 0 ]; then
            echo "Setting AWS credentials..."
            echo "AWS_ACCESS_KEY_ID=$(echo "$CREDS_JSON" | python3 -c "import json,sys; print(json.load(sys.stdin)['Credentials']['AccessKeyId'])")" >> "$GITHUB_ENV"
            echo "AWS_SECRET_ACCESS_KEY=$(echo "$CREDS_JSON" | python3 -c "import json,sys; print(json.load(sys.stdin)['Credentials']['SecretAccessKey'])")" >> "$GITHUB_ENV"
            echo "AWS_SESSION_TOKEN=$(echo "$CREDS_JSON" | python3 -c "import json,sys; print(json.load(sys.stdin)['Credentials']['SessionToken'])")" >> "$GITHUB_ENV"
            echo "AWS_REGION=us-east-1" >> "$GITHUB_ENV"
          fi
        continue-on-error: true

      - name: Sync to S3
        run: |
          aws s3 sync . s3://${{ secrets.S3_BUCKET }} \
            --exclude ".git/*" \
            --delete
        continue-on-error: true

      - name: Invalidate CloudFront
        run: |
          aws cloudfront create-invalidation \
            --distribution-id EMIUUC0YN2RQ7 \
            --paths "/*"
        continue-on-error: true
