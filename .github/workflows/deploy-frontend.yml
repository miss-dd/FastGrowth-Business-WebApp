name: Deploy Frontend to S3

on:
  push:
    branches: [main]
    paths:
      - 'frontend/**'
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      ACTIONS_ALLOW_USE_UNSECURE_NODE_VERSION: true
    defaults:
      run:
        working-directory: ./frontend

    steps:
      - uses: actions/checkout@v4

      - name: Assume role with OIDC
        run: |
          TOKEN=$(curl -s -H "Authorization: bearer $ACTIONS_ID_TOKEN_REQUEST_TOKEN" \
            "$ACTIONS_ID_TOKEN_REQUEST_URL&audience=sts.amazonaws.com" | python3 -c "import json,sys; print(json.load(sys.stdin)['value'])")
          echo "Token acquired, assuming role..."

          CREDS_JSON=$(aws sts assume-role-with-web-identity \
            --role-arn arn:aws:iam::382975714531:role/github-fastgrowth-s3-deploy \
            --role-session-name GitHubActions \
            --web-identity-token "$TOKEN" \
            --duration-seconds 3600 \
            --region us-east-1 2>&1)
          echo "Result:"
          echo "$CREDS_JSON" | python3 -m json.tool 2>/dev/null || echo "$CREDS_JSON"

          if echo "$CREDS_JSON" | python3 -c "import json,sys; json.load(sys.stdin)" 2>/dev/null; then
            AKI=$(echo "$CREDS_JSON" | python3 -c "import json,sys; print(json.load(sys.stdin)['Credentials']['AccessKeyId'])")
            SAK=$(echo "$CREDS_JSON" | python3 -c "import json,sys; print(json.load(sys.stdin)['Credentials']['SecretAccessKey'])")
            ST=$(echo "$CREDS_JSON" | python3 -c "import json,sys; print(json.load(sys.stdin)['Credentials']['SessionToken'])")
            echo "AWS_ACCESS_KEY_ID=$AKI" >> "$GITHUB_ENV"
            echo "AWS_SECRET_ACCESS_KEY=$SAK" >> "$GITHUB_ENV"
            echo "AWS_SESSION_TOKEN=$ST" >> "$GITHUB_ENV"
            echo "AWS_REGION=us-east-1" >> "$GITHUB_ENV"
            echo "Role assumed successfully!"
          fi

      - name: Sync to S3
        run: |
          aws s3 sync . s3://${{ secrets.S3_BUCKET }} \
            --exclude ".git/*" \
            --delete

      - name: Invalidate CloudFront
        run: |
          aws cloudfront create-invalidation \
            --distribution-id EMIUUC0YN2RQ7 \
            --paths "/*"
